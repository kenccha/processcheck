<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProcessCheck - 개발 프로세스 관리 시스템</title>
  <link rel="stylesheet" href="css/styles.css" />

  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/11.3.0/firebase-app.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/11.3.0/firebase-firestore.js"
    }
  }
  </script>

  <style>
    /* ── Login Page Enhancements ── */

    .login-logo-icon--large {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--primary-400), var(--primary-600));
      border-radius: 1.125rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        var(--shadow-glow),
        0 8px 32px rgba(6, 182, 212, 0.2);
    }

    .login-logo-icon--large span {
      color: white;
      font-weight: 800;
      font-size: 1.75rem;
      letter-spacing: -0.05em;
    }

    .login-title-text {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--slate-100);
      letter-spacing: -0.025em;
    }

    .login-title-text .accent {
      color: var(--primary-400);
    }

    .login-subtitle {
      font-size: 0.875rem;
      color: var(--slate-500);
      text-align: center;
      margin-top: 0.25rem;
    }

    .login-heading {
      font-size: 1rem;
      font-weight: 600;
      color: var(--slate-200);
      margin-bottom: 0.75rem;
    }

    .login-label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--slate-400);
      margin-bottom: 0.5rem;
    }

    /* ── Role Cards Grid ── */
    .role-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }

    .role-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.375rem;
      padding: 1rem 0.75rem;
      background: var(--surface-1);
      border: 1.5px solid var(--surface-3);
      border-radius: var(--radius-xl);
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      user-select: none;
    }

    .role-card:hover {
      border-color: rgba(6, 182, 212, 0.3);
      background: rgba(6, 182, 212, 0.04);
    }

    .role-card.role-selected {
      border-color: rgba(6, 182, 212, 0.6);
      background: rgba(6, 182, 212, 0.1);
      box-shadow: 0 0 16px rgba(6, 182, 212, 0.12), inset 0 1px 0 0 rgba(255, 255, 255, 0.05);
    }

    .role-card-icon {
      font-size: 1.5rem;
      line-height: 1;
    }

    .role-card-label {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--slate-200);
    }

    .role-card-desc {
      font-size: 0.6875rem;
      color: var(--slate-500);
      line-height: 1.3;
    }

    /* ── Error Message ── */
    .login-error {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 0.875rem;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: var(--radius-lg);
      color: var(--danger-400);
      font-size: 0.8125rem;
      font-weight: 500;
    }

    .login-error svg {
      flex-shrink: 0;
      width: 1rem;
      height: 1rem;
    }

    /* ── Login Button Full Width ── */
    .btn-login {
      width: 100%;
      padding: 0.75rem 1.25rem;
      font-size: 0.9375rem;
      font-weight: 600;
    }

    /* ── Footer Text ── */
    .login-footer-text {
      font-size: 0.75rem;
      color: var(--slate-600);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
    }

    .login-footer-text svg {
      width: 0.875rem;
      height: 0.875rem;
      color: var(--slate-600);
      flex-shrink: 0;
    }

    /* ── Copyright ── */
    .login-copyright {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6875rem;
      color: var(--slate-700);
      white-space: nowrap;
    }

    /* ── Spinner View ── */
    .login-spinner-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 4rem 2rem;
    }

    .login-spinner-view .spinner {
      width: 2.5rem;
      height: 2.5rem;
    }

    .login-spinner-text {
      font-size: 0.875rem;
      color: var(--slate-500);
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <!-- Background -->
    <div class="login-bg bg-grid"></div>

    <!-- Loading Spinner View -->
    <div id="login-spinner" class="login-card hidden">
      <div class="login-spinner-view">
        <div class="spinner"></div>
        <div class="login-spinner-text">데이터를 초기화하는 중...</div>
      </div>
    </div>

    <!-- Login Form -->
    <div id="login-form" class="login-card">
      <!-- Logo -->
      <div class="login-logo animate-fade-in" style="flex-direction: column; gap: 0.75rem;">
        <div class="login-logo-icon--large">
          <span>PC</span>
        </div>
        <div style="text-align: center;">
          <div class="login-title-text glow-text">
            Process<span class="accent">Check</span>
          </div>
          <div class="login-subtitle">개발 프로세스 관리 시스템</div>
        </div>
      </div>

      <!-- Divider -->
      <hr class="divider" style="margin: 1.5rem 0;" />

      <!-- Form Section -->
      <div class="animate-fade-in-delay-1">
        <h2 class="login-heading" style="text-align: center; margin-bottom: 1.5rem;">시스템 로그인</h2>

        <!-- Name Input -->
        <div style="margin-bottom: 1.25rem;">
          <label class="login-label" for="login-name-input">이름</label>
          <input
            type="text"
            id="login-name-input"
            class="input-field"
            placeholder="홍길동"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
      </div>

      <!-- Role Selection -->
      <div class="animate-fade-in-delay-2" style="margin-bottom: 1.25rem;">
        <label class="login-label">역할 선택</label>
        <div class="role-grid">
          <div class="role-card role-selected" id="role-worker" data-role="worker">
            <span class="role-card-icon">&#x1F468;&#x200D;&#x1F4BB;</span>
            <span class="role-card-label">실무자</span>
            <span class="role-card-desc">체크리스트 작업 수행</span>
          </div>
          <div class="role-card" id="role-manager" data-role="manager">
            <span class="role-card-icon">&#x1F454;</span>
            <span class="role-card-label">부서 관리자</span>
            <span class="role-card-desc">작업 검토 및 승인</span>
          </div>
          <div class="role-card" id="role-pm" data-role="pm">
            <span class="role-card-icon">&#x1F4CA;</span>
            <span class="role-card-label">프로세스 관리자</span>
            <span class="role-card-desc">전체 프로세스 모니터링</span>
          </div>
          <div class="role-card" id="role-scheduler" data-role="scheduler">
            <span class="role-card-icon">&#x1F4C5;</span>
            <span class="role-card-label">일정 관리자</span>
            <span class="role-card-desc">일정 및 마감일 관리</span>
          </div>
        </div>
      </div>

      <!-- Error Message -->
      <div id="login-error" class="login-error hidden" style="margin-bottom: 1rem;">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span></span>
      </div>

      <!-- Login Button -->
      <div class="animate-fade-in-delay-3" style="margin-bottom: 1.5rem;">
        <button id="login-btn" class="btn-primary btn-login">
          <span>로그인</span>
        </button>
      </div>

      <!-- Footer -->
      <div class="animate-fade-in-delay-4">
        <div class="login-footer-text">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
          </svg>
          Firebase Firestore 연동 &middot; 실시간 데이터 동기화
        </div>
      </div>
    </div>

    <!-- Copyright -->
    <div class="login-copyright">&copy; 2026 ProcessCheck. All rights reserved.</div>
  </div>

  <script type="module" src="js/pages/login.js"></script>
</body>
</html>
