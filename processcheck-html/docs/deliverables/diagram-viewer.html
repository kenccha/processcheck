<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ProcessCheck 시스템 설계도</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  color: #fff;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  gap: 12px;
  flex-wrap: wrap;
}
header h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
  white-space: nowrap;
}
header h1 span { color: #4fc3f7; }
.header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.header-actions button {
  background: rgba(255,255,255,0.12);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 7px 16px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: background .2s, transform .1s;
  white-space: nowrap;
}
.header-actions button:hover {
  background: rgba(255,255,255,0.25);
  transform: translateY(-1px);
}
.header-actions button.edit-mode {
  background: rgba(255,160,0,0.3);
  border-color: rgba(255,160,0,0.5);
}
.tabs {
  display: flex;
  background: #fff;
  border-bottom: 2px solid #e0e0e0;
  flex-shrink: 0;
  overflow-x: auto;
}
.tab-btn {
  padding: 12px 28px;
  font-size: 13px;
  font-weight: 600;
  border: none;
  background: none;
  cursor: pointer;
  color: #666;
  border-bottom: 3px solid transparent;
  transition: all .2s;
  white-space: nowrap;
}
.tab-btn:hover {
  color: #1a1a2e;
  background: #f5f5f5;
}
.tab-btn.active {
  color: #1565c0;
  border-bottom-color: #1565c0;
  background: #e3f2fd;
}
.content-area {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: #ffffff;
}
.diagram-container {
  width: 100%;
  height: 100%;
  overflow: auto;
  padding: 0;
}
.diagram-container .mxgraph {
  margin: 0 auto;
}
.editor-container {
  width: 100%;
  height: 100%;
  display: none;
}
.editor-container iframe {
  width: 100%;
  height: 100%;
  border: none;
}
.status-bar {
  background: #fafafa;
  border-top: 1px solid #e0e0e0;
  padding: 6px 20px;
  font-size: 11px;
  color: #888;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.status-bar .left { display: flex; gap: 16px; }
.status-bar .badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
}
.badge-view { background: #e3f2fd; color: #1565c0; }
.badge-edit { background: #fff3e0; color: #e65100; }
.loading-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  font-size: 15px;
  color: #666;
}
.loading-overlay .spinner {
  width: 24px;
  height: 24px;
  border: 3px solid #e0e0e0;
  border-top-color: #1565c0;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media print {
  header, .tabs, .status-bar { display: none; }
  .content-area { overflow: visible; }
  body { overflow: visible; height: auto; }
}
@media (max-width: 640px) {
  .tab-btn { padding: 10px 14px; font-size: 12px; }
  header h1 { font-size: 15px; }
  header { padding: 10px 16px; }
  .header-actions button { padding: 5px 10px; font-size: 11px; }
}
</style>
</head>

\"100\" as=\"geometry\"/>\n        </mxCell>\n        <mxCell id=\"a_st1\" value=\"파일 업로드 (UI only)&#xa;Storage 연동 미구현\" style=\"rounded=1;whiteSpace=wrap;html=1;fillColor=#f8cecc;strokeColor=#b85450;fontSize=10;fontStyle=2;\" vertex=\"1\" parent=\"a_stor\">\n          <mxGeometry x=\"40\" y=\"40\" width=\"200\" height=\"40\" as=\"geometry\"/>\n        </mxCell>\n\n        <!-- ===== DEPLOYMENT LAYER ===== -->\n        <mxCell id=\"a_dl\" value=\"배포 레이어 (Deployment)\" style=\"swimlane;startSize=30;fillColor=#d5e8d4;strokeColor=#82b366;fontSize=14;fontStyle=1;rounded=1;\" vertex=\"1\" parent=\"1\">\n          <mxGeometry x=\"80\" y=\"720\" width=\"1400\" height=\"200\" as=\"geometry\"/>\n        </mxCell>\n\n        <mxCell id=\"a_gh\" value=\"GitHub Repository&#xa;(main branch)\" style=\"rounded=1;whiteSpace=wrap;html=1;fillColor=#ffffff;strokeColor=#82b366;fontSize=12;fontStyle=1;\" vertex=\"1\" parent=\"a_dl\">\n          <mxGeometry x=\"60\" y=\"60\" width=\"200\" height=\"60\" as=\"geometry\"/>\n        </mxCell>\n        <mxCell id=\"a_ga\" value=\"GitHub Actions&#xa;(CI/CD Pipeline)&#xa;push to main -&gt; build -&gt; deploy\" style=\"rounded=1;whiteSpace=wrap;html=1;fillColor=#ffffff;strokeColor=#82b366;fontSize=11;\" vertex=\"1\" parent=\"a_dl\">\n          <mxGeometry x=\"360\" y=\"50\" width=\"250\" height=\"80\" as=\"geometry\"/>\n        </mxCell>\n        <mxCell id=\"a_gp\" value=\"GitHub Pages&#xa;(Static Hosting)&#xa;processcheck.github.io\" style=\"rounded=1;whiteSpace=wrap;html=1;fillColor=#ffffff;strokeColor=#82b366;fontSize=12;fontStyle=1;\" vertex=\"1\" parent=\"a_dl\">\n          <mxGeometry x=\"720\" y=\"60\" width=\"220\" height=\"60\" as=\"geometry\"/>\n        </mxCell>\n        <mxCell id=\"a_build\" value=\"npm run build&#xa;(next export -&gt; /out)\" style=\"rounded=1;whiteSpace=wrap;html=1;fillColor=#ffffff;strokeColor=#82b366;fontSize=10;\" vertex=\"1\" parent=\"a_dl\">\n          <mxGeometry x=\"1060\" y=\"60\" width=\"160\" height=\"50\" as=\"geometry\"/>\n        </mxCell>\n\n        <!-- Deploy arrows -->\n        <mxCell id=\"f_gh_ga\" value=\"push\" style=\"edgeStyle=orthogonalEdgeStyle;rounded=1;strokeColor=#82b366;strokeWidth=2;fontSize=10;\" edge=\"1\" source=\"a_gh\" target=\"a_ga\" parent=\"a_dl\">\n          <mxGeometry relative=\"1\" as=\"geometry\"/>\n        </mxCell>\n        <mxCell id=\"f_ga_gp\" value=\"deploy\" style=\"edgeStyle=orthogonalEdgeStyle;rounded=1;strokeColor=#82b366;strokeWidth=2;fontSize=10;\" edge=\"1\" source=\"a_ga\" target=\"a_gp\" parent=\"a_dl\">\n          <mxGeometry relative=\"1\" as=\"geometry\"/>\n        </mxCell>\n\n        <!-- DATA FLOW ARROWS between layers -->\n        <mxCell id=\"df1\" value=\"Firebase SDK\" style=\"edgeStyle=orthogonalEdgeStyle;rounded=1;strokeColor=#d6b656;strokeWidth=2.5;fontSize=11;fontStyle=1;exitX=0.25;exitY=1;exitDx=0;exitDy=0;entryX=0.25;entryY=0;entryDx=0;entryDy=0;\" edge=\"1\" source=\"a_cl\" target=\"a_sl\" parent=\"1\">\n          <mxGeometry relative=\"1\" as=\"geometry\"/>\n        </mxCell>\n        <mxCell id=\"df2\" value=\"Real-time Sync\" style=\"edgeStyle=orthogonalEdgeStyle;rounded=1;strokeColor=#d6b656;strokeWidth=2.5;fontSize=11;fontStyle=1;exitX=0.75;exitY=0;exitDx=0;exitDy=0;entryX=0.75;entryY=1;entryDx=0;entryDy=0;\" edge=\"1\" source=\"a_sl\" target=\"a_cl\" parent=\"1\">\n          <mxGeometry relative=\"1\" as=\"geometry\"/>\n        </mxCell>\n        <mxCell id=\"df3\" value=\"Static Files\" style=\"edgeStyle=orthogonalEdgeStyle;rounded=1;strokeColor=#82b366;strokeWidth=2;fontSize=11;exitX=0.5;exitY=1;exitDx=0;exitDy=0;entryX=0.5;entryY=0;entryDx=0;entryDy=0;\" edge=\"1\" source=\"a_cl\" target=\"a_dl\" parent=\"1\">\n          <mxGeometry relative=\"1\" as=\"geometry\"/>\n        </mxCell>\n\n        <!-- Auth flow labels -->\n        <mxCell id=\"a_flow1\" value=\"인증 경로 1: Demo Card&#xa;카드 클릭 -&gt; localStorage -&gt; Dashboard\" style=\"text;html=1;fontSize=10;align=left;fillColor=#f5f5f5;strokeColor=#cccccc;rounded=1;spacingLeft=6;\" vertex=\"1\" parent=\"1\">\n          <mxGeometry x=\"80\" y=\"970\" width=\"280\" height=\"35\" as=\"geometry\"/>\n        </mxCell>\n        <mxCell id=\"a_flow2\" value=\"인증 경로 2: Microsoft OAuth&#xa;OAuth -&gt; Firebase Auth -&gt; Firestore 조회/등록 -&gt; Dashboard\" style=\"text;html=1;fontSize=10;align=left;fillColor=#f5f5f5;strokeColor=#cccccc;rounded=1;spacingLeft=6;\" vertex=\"1\" parent=\"1\">\n          <mxGeometry x=\"400\" y=\"970\" width=\"380\" height=\"35\" as=\"geometry\"/>\n        </mxCell>\n        <mxCell id=\"a_flow3\" value=\"인증 경로 3: Customer Portal&#xa;이메일 입력 -&gt; Firestore 검증 -&gt; sessionStorage -&gt; 읽기 전용 뷰\" style=\"text;html=1;fontSize=10;align=left;fillColor=#f5f5f5;strokeColor=#cccccc;rounded=1;spacingLeft=6;\" vertex=\"1\" parent=\"1\">\n          <mxGeometry x=\"820\" y=\"970\" width=\"380\" height=\"35\" as=\"geometry\"/>\n        </mxCell>\n\n      </root>\n    </mxGraphModel>\n  </diagram>\n</mxfile>\n";

  var viewerArea = document.getElementById('viewerArea');
  var editorContainer = document.getElementById('editorContainer');
  var editorFrame = document.getElementById('editorFrame');
  var editToggle = document.getElementById('editToggle');
  var modeBadge = document.getElementById('modeBadge');
  var loadingOverlay = document.getElementById('loadingOverlay');
  var loadingText = document.getElementById('loadingText');
  var tabInfo = document.getElementById('tabInfo');

  tabInfo.textContent = tabCount + '개 다이어그램 | ' + tabNames[0];

  // ---- Tab switching ----
  window.switchTab = function(idx) {
    activeTab = idx;
    // Update tab buttons
    var btns = document.querySelectorAll('.tab-btn');
    btns.forEach(function(b, i) { b.classList.toggle('active', i === idx); });

    tabInfo.textContent = tabCount + '개 다이어그램 | ' + tabNames[idx];

    if (isEditMode) {
      // In edit mode, load the selected tab's XML into the editor
      sendXmlToEditor(tabXml[idx]);
    } else {
      // In view mode, show/hide diagram containers
      for (var i = 0; i < tabCount; i++) {
        var el = document.getElementById('diagram-' + i);
        if (el) el.style.display = (i === idx) ? 'block' : 'none';
      }
    }
  };

  // ---- Edit mode toggle ----
  window.toggleEditMode = function() {
    if (!isEditMode) {
      // Switch to edit mode
      isEditMode = true;
      viewerArea.style.display = 'none';
      editorContainer.style.display = 'block';
      editToggle.textContent = '보기 모드';
      editToggle.classList.add('edit-mode');
      modeBadge.textContent = '편집 모드';
      modeBadge.className = 'badge badge-edit';

      // Show loading
      loadingOverlay.style.display = 'flex';
      loadingText.textContent = 'draw.io 에디터 로딩 중...';

      // Load embed.diagrams.net editor
      editorFrame.src = 'https://embed.diagrams.net/?embed=1&proto=json&spin=1&libraries=1&configure=1';
    } else {
      // Switch to view mode
      isEditMode = false;
      editorContainer.style.display = 'none';
      viewerArea.style.display = 'block';
      editToggle.textContent = '편집 모드';
      editToggle.classList.remove('edit-mode');
      modeBadge.textContent = '보기 모드';
      modeBadge.className = 'badge badge-view';

      // Close editor
      editorFrame.src = 'about:blank';

      // Re-render the current tab to reflect any edits
      refreshViewer(activeTab);
    }
  };

  // ---- postMessage communication with embed.diagrams.net ----
  window.addEventListener('message', function(evt) {
    if (!evt.data) return;
    var msg;
    try { msg = JSON.parse(evt.data); } catch(e) { return; }

    if (msg.event === 'configure') {
      // Send configuration
      editorFrame.contentWindow.postMessage(JSON.stringify({
        action: 'configure',
        config: {
          defaultFonts: ['Noto Sans KR', 'Segoe UI', 'Arial']
        }
      }), '*');
    }
    else if (msg.event === 'init') {
      // Editor ready - send XML
      loadingOverlay.style.display = 'none';
      sendXmlToEditor(tabXml[activeTab]);
    }
    else if (msg.event === 'save') {
      // User saved in editor
      if (msg.xml) {
        tabXml[activeTab] = msg.xml;
        updateFullXml();
        // Show brief save feedback
        loadingOverlay.style.display = 'flex';
        loadingText.textContent = '저장 완료!';
        setTimeout(function() { loadingOverlay.style.display = 'none'; }, 800);
      }
      // Send back an acknowledgment
      editorFrame.contentWindow.postMessage(JSON.stringify({
        action: 'status',
        message: '저장 완료',
        modified: true
      }), '*');
    }
    else if (msg.event === 'exit') {
      // User clicked exit in editor
      toggleEditMode();
    }
    else if (msg.event === 'export') {
      // Handle export if needed
    }
  });

  function sendXmlToEditor(xml) {
    if (!editorFrame.contentWindow) return;
    editorFrame.contentWindow.postMessage(JSON.stringify({
      action: 'load',
      autosave: 1,
      xml: xml
    }), '*');
  }

  function updateFullXml() {
    // Rebuild fullXml from individual tab XMLs
    // Parse each tab's XML, extract the <diagram> element, combine into one <mxfile>
    try {
      var parser = new DOMParser();
      var serializer = new XMLSerializer();
      var mxfile = parser.parseFromString('<mxfile host="app.diagrams.net"></mxfile>', 'text/xml');
      var root = mxfile.documentElement;

      for (var i = 0; i < tabXml.length; i++) {
        var tabDoc = parser.parseFromString(tabXml[i], 'text/xml');
        var diagram = tabDoc.querySelector('diagram');
        if (diagram) {
          root.appendChild(mxfile.importNode(diagram, true));
        }
      }
      fullXml = serializer.serializeToString(mxfile);
    } catch(e) {
      console.warn('Failed to rebuild full XML:', e);
    }
  }

  function refreshViewer(idx) {
    // Re-create the mxgraph div for the given tab with updated XML
    var container = document.getElementById('diagram-' + idx);
    if (!container) return;

    var config = {
      "highlight": "#0000ff",
      "nav": true,
      "resize": true,
      "toolbar": "zoom layers lightbox",
      "edit": "_blank",
      "xml": tabXml[idx]
    };

    container.innerHTML = '<div class="mxgraph" style="max-width:100%;border:none;" data-mxgraph=\'' + 
      escapeHtmlAttr(JSON.stringify(config)) + '\'></div>';

    // Re-trigger the viewer
    if (typeof GraphViewer !== 'undefined') {
      // Remove any existing graph viewer instances on this container
      var mxDiv = container.querySelector('.mxgraph');
      if (mxDiv) {
        GraphViewer.processElements(mxDiv.parentNode);
      }
    }

    // Show the right container
    for (var i = 0; i < tabCount; i++) {
      var el = document.getElementById('diagram-' + i);
      if (el) el.style.display = (i === idx) ? 'block' : 'none';
    }
  }

  function escapeHtmlAttr(str) {
    return str.replace(/&/g, '&amp;').replace(/'/g, '&#39;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ---- Download ----
  window.downloadDrawio = function() {
    var blob = new Blob([fullXml], { type: 'application/xml' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'diagrams.drawio';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  };

})();
</script>
